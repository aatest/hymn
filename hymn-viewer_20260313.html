<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찬송가 · 복음성가 악보 뷰어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f0e3;
    --sidebar-bg: #f0e8d8;
    --sidebar-text: #2a2018;
    --sidebar-muted: #8a7860;
    --accent: #c4922a;
    --accent-light: #e8b84b;
    --viewer-bg: #fffaf3;
    --border: #dfd0b0;
    --hover: #e8dcc8;
    --active: #c4922a;
    --tag-hymn: #5a7c55;
    --tag-gospel: #7c5a7a;
    --shadow: 0 4px 24px rgba(0,0,0,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--sidebar-bg);
    color: var(--sidebar-text);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid #2e2418;
    flex-shrink: 0;
    z-index: 10;
  }
  header .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--sidebar-text);
    letter-spacing: 0.5px;
  }
  header .logo span { color: var(--sidebar-muted); font-size: 14px; margin-left: 8px; font-family: 'Noto Sans KR', sans-serif; font-weight: 300; }
  .header-actions {
    display: flex;
    gap: 6px;
    margin-left: 10px;
  }
  .hdr-btn {
    background: rgba(196,146,42,0.15);
    border: 1px solid rgba(196,146,42,0.4);
    color: var(--accent-light);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .hdr-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  header .count-badge {
    margin-left: auto;
    background: rgba(196,146,42,0.18);
    color: var(--accent-light);
    border: 1px solid rgba(196,146,42,0.35);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
  }

  /* ── Main Layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 320px;
    min-width: 260px;
    max-width: 420px;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    border-right: 1px solid #2e2418;
    flex-shrink: 0;
    resize: horizontal;
    overflow: hidden;
    transition: width 0.15s cubic-bezier(0.4,0,0.2,1),
                min-width 0.15s cubic-bezier(0.4,0,0.2,1),
                opacity 0.12s;
  }
  .sidebar.collapsed {
    width: 0 !important;
    min-width: 0 !important;
    opacity: 0;
    pointer-events: none;
    border-right: none;
  }

  /* 사이드바 토글 버튼 */
  .sidebar-toggle {
    position: absolute;
    top: 50%;
    left: 320px; /* sidebar 기본 너비와 동일하게 */
    transform: translateY(-50%);
    z-index: 30;
    width: 22px;
    height: 56px;
    background: var(--accent);
    border: none;
    border-radius: 0 10px 10px 0;
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 2px 0 10px rgba(0,0,0,0.18);
    padding: 0;
    line-height: 1;
    transition: background 0.15s;
  }
  .sidebar-toggle:hover { background: var(--accent-light); }
  .sidebar-toggle .arrow { transition: transform 0.28s; display: inline-block; }
  .sidebar-toggle.open .arrow { transform: rotate(0deg); }
  .sidebar-toggle.closed .arrow { transform: rotate(180deg); }

  /* Search */
  .search-area {
    padding: 16px;
    border-bottom: 1px solid #2e2418;
    flex-shrink: 0;
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: #ece4d4;
    border: 1px solid #c8b898;
    border-radius: 8px;
    color: var(--sidebar-text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 9px 36px 9px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input::placeholder { color: var(--sidebar-muted); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .search-icon {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--sidebar-muted);
    pointer-events: none;
    font-size: 14px;
  }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .filter-tab {
    flex: 1;
    padding: 6px 0;
    background: transparent;
    border: 1px solid #c8b898;
    border-radius: 6px;
    color: var(--sidebar-muted);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .filter-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
  .filter-tab:hover:not(.active) { border-color: var(--accent); color: var(--accent-light); }

  /* Add button */
  .add-btn {
    margin: 12px 16px 0;
    width: calc(100% - 32px);
    padding: 9px;
    background: linear-gradient(135deg, var(--accent), #a07020);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.98); }

  /* List */
  .list-header {
    padding: 10px 16px 6px;
    font-size: 11px;
    color: var(--sidebar-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .song-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 12px;
    scrollbar-width: thin;
    scrollbar-color: #c8b898 transparent;
  }
  .song-list::-webkit-scrollbar { width: 4px; }
  .song-list::-webkit-scrollbar-track { background: transparent; }
  .song-list::-webkit-scrollbar-thumb { background: #c8b898; border-radius: 4px; }

  .song-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
    position: relative;
  }
  .song-item:hover { background: var(--hover); }
  .song-item.active { background: rgba(196,146,42,0.15); }
  .song-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; height: 60%;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .song-item.dragging { opacity: 0.4; }
  .song-item.drag-over { background: rgba(196,146,42,0.12); border-top: 2px solid var(--accent); }

  .drag-handle {
    color: #b0a090;
    font-size: 14px;
    cursor: grab;
    flex-shrink: 0;
    padding: 2px;
    transition: color 0.15s;
  }
  .song-item:hover .drag-handle { color: var(--sidebar-muted); }

  .song-num {
    font-size: 11px;
    color: var(--sidebar-muted);
    min-width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  .song-info { flex: 1; min-width: 0; }
  .song-title {
    font-size: 13px;
    color: var(--sidebar-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }
  .song-item.active .song-title { color: var(--accent-light); }
  .song-sub {
    font-size: 11px;
    color: var(--sidebar-muted);
    margin-top: 2px;
  }

  .song-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    flex-shrink: 0;
    font-weight: 500;
  }
  .tag-hymn { background: #c8e0c8; color: #2a5c30; }
  .tag-gospel { background: #dcc8dc; color: #5c2a58; }

  .song-pages {
    font-size: 10px;
    color: var(--sidebar-muted);
    flex-shrink: 0;
  }

  .delete-btn {
    background: none;
    border: none;
    color: #b0a090;
    font-size: 14px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    opacity: 0;
    transition: all 0.15s;
  }
  .song-item:hover .delete-btn { opacity: 1; color: #c06060; }

  /* Empty state */
  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--sidebar-muted);
    font-size: 13px;
    line-height: 1.8;
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 12px; }

  /* ── Viewer ── */
  .viewer {
    flex: 1;
    background: var(--viewer-bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    min-width: 0;
  }

  .viewer-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: #fff;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .viewer-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 600;
    color: #2a1e10;
    flex: 1;
  }
  .viewer-subtitle {
    font-size: 12px;
    color: #8a7d68;
    margin-top: 2px;
  }
  .nav-btn {
    background: var(--sidebar-bg);
    border: none;
    color: var(--sidebar-text);
    width: 36px; height: 36px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; background: #ccc; }
  .page-indicator {
    font-size: 13px;
    color: #8a7d68;
    min-width: 60px;
    text-align: center;
    flex-shrink: 0;
  }

  /* ── Continuous Nav Bar ── */
  .cont-nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 20px;
    background: #fffdf8;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 10px;
  }
  .cont-nav-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    color: #7a6a50;
    cursor: pointer;
    transition: all 0.15s;
    max-width: 200px;
    overflow: hidden;
  }
  .cont-nav-btn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); color: #fff; }
  .cont-nav-btn:disabled { opacity: 0.28; cursor: default; }
  .cont-nav-btn .arrow { font-size: 14px; flex-shrink: 0; }
  .cont-nav-btn .label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cont-song-info {
    font-size: 12px;
    color: #a09070;
    text-align: center;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .cont-song-info strong { color: #6a5030; font-weight: 600; }

  .zoom-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    border-left: 1px solid var(--border);
    padding-left: 12px;
    margin-left: 4px;
  }
  .zoom-btn {
    background: #f0ebe0;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 30px; height: 30px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #4a3c28;
    transition: background 0.15s;
  }
  .zoom-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .zoom-level { font-size: 12px; color: #8a7d68; min-width: 38px; text-align: center; }

  /* Image area */
  .image-area {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px;
    background: var(--bg);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    position: relative;
    min-height: 0;
  }

  .sheet-image {
    max-width: calc(100% - 40px);
    max-height: calc(100vh - 260px);
    width: auto;
    height: auto;
    object-fit: contain;
    box-shadow: var(--shadow);
    border-radius: 4px;
    transition: transform 0.2s;
    transform-origin: top center;
    display: block;
  }

  /* Welcome / No selection */
  .no-selection {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #b0a090;
    gap: 16px;
  }
  .no-selection .big-icon { font-size: 64px; opacity: 0.4; }
  .no-selection h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    color: #8a7060;
    font-weight: 600;
  }
  .no-selection p { font-size: 14px; color: #b0a090; text-align: center; line-height: 1.7; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--sidebar-bg);
    border: 1px solid #c8b898;
    border-radius: 16px;
    padding: 28px;
    width: 440px;
    max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transform: translateY(20px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h3 {
    font-family: 'Noto Serif KR', serif;
    color: var(--accent-light);
    font-size: 18px;
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 12px;
    color: var(--sidebar-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .form-input {
    width: 100%;
    background: #ece4d4;
    border: 1px solid #c8b898;
    border-radius: 8px;
    color: var(--sidebar-text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 9px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }

  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }

  .type-radio {
    display: flex;
    gap: 10px;
  }
  .type-radio label {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px;
    border: 1px solid #c8b898;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--sidebar-muted);
    transition: all 0.15s;
  }
  .type-radio input { display: none; }
  .type-radio input:checked + span { color: var(--accent-light); }
  .type-radio label:has(input:checked) { border-color: var(--accent); background: rgba(196,146,42,0.1); color: var(--accent-light); }

  /* File drop zone */
  .drop-zone {
    border: 2px dashed #c8b898;
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--sidebar-muted);
    font-size: 13px;
    line-height: 1.7;
  }
  .drop-zone:hover, .drop-zone.drag-active { border-color: var(--accent); background: rgba(196,146,42,0.05); color: var(--accent-light); }
  .drop-zone .drop-icon { font-size: 28px; margin-bottom: 8px; }
  .file-preview {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .file-chip {
    background: rgba(196,146,42,0.15);
    border: 1px solid rgba(196,146,42,0.3);
    color: var(--accent-light);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    display: flex; align-items: center; gap: 5px;
  }
  .file-chip button { background: none; border: none; color: inherit; cursor: pointer; font-size: 12px; padding: 0; line-height: 1; }

  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn-cancel {
    flex: 1; padding: 10px;
    background: transparent; border: 1px solid #c8b898;
    border-radius: 8px; color: var(--sidebar-muted);
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: #5a4a38; color: var(--sidebar-text); }
  .btn-save {
    flex: 2; padding: 10px;
    background: linear-gradient(135deg, var(--accent), #a07020);
    border: none; border-radius: 8px; color: #fff;
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.88; }

  /* Thumbnail strip */
  .thumb-strip {
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    background: #fff;
    border-top: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
    min-height: 68px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .thumb {
    width: 44px; height: 50px;
    object-fit: cover;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.15s, transform 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .thumb:hover { transform: scale(1.08); }
  .thumb.active { border-color: var(--accent); }
  .thumb-placeholder {
    width: 44px; height: 50px;
    background: #f0e8d8;
    border-radius: 4px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer;
    transition: all 0.15s;
  }
  .thumb-placeholder:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Keyboard hints */
  .kbd-hint {
    position: absolute;
    bottom: 14px;
    right: 18px;
    display: flex;
    gap: 8px;
    opacity: 0.45;
    font-size: 11px;
    color: #8a7060;
    pointer-events: none;
  }
  .kbd { background: #e8dfc8; border-radius: 4px; padding: 2px 6px; }

  /* ── Catalog Modal ── */
  .catalog-btn {
    margin: 8px 16px 0;
    width: calc(100% - 32px);
    padding: 8px;
    background: transparent;
    border: 1px solid #c8b898;
    border-radius: 8px;
    color: var(--sidebar-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    flex-shrink: 0;
  }
  .catalog-btn:hover { border-color: var(--accent); color: var(--accent-light); }

  .catalog-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .catalog-overlay.open { opacity: 1; pointer-events: all; }

  .catalog-modal {
    background: var(--sidebar-bg);
    border: 1px solid #c8b898;
    border-radius: 16px;
    width: 600px;
    max-width: 95vw;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55);
    transform: translateY(24px);
    transition: transform 0.2s;
    overflow: hidden;
  }
  .catalog-overlay.open .catalog-modal { transform: translateY(0); }

  .catalog-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid #2e2418;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .catalog-header h3 {
    font-family: 'Noto Serif KR', serif;
    color: var(--accent-light);
    font-size: 16px;
    flex: 1;
  }
  .catalog-close {
    background: none; border: none;
    color: var(--sidebar-muted); font-size: 18px;
    cursor: pointer; padding: 2px 6px;
    border-radius: 6px; transition: all 0.15s;
  }
  .catalog-close:hover { background: #2e2418; color: var(--sidebar-text); }

  .catalog-search-row {
    padding: 12px 16px;

<script>
// ─────────────────────────────────────────
//  State
// ─────────────────────────────────────────
let songs = [];
let activeId = null;
let currentPageIdx = 0;
let zoomScale = 1;
let filterMode = 'all';
let searchQuery = '';
let pendingFiles = []; // {name, dataUrl}
let dragSrcId = null;

// ─────────────────────────────────────────
//  Image Folder State
//  key: "hymn:93" or "gospel:5"  → [dataUrl, dataUrl, ...]
// ─────────────────────────────────────────
let folderImageMap = {};   // 번호 → [dataUrl, ...]
let folderName = '';       // 표시용 폴더명
let folderFileCount = 0;   // 총 이미지 파일 수
let folderMappedCount = 0; // 번호 매핑된 파일 수

// ─────────────────────────────────────────
//  IndexedDB (용량 제한 없음)
// ─────────────────────────────────────────
const DB_NAME = 'HymnViewerDB';
const DB_VERSION = 1;
const STORE = 'songs';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function dbPutAll(songList) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    // 기존 전체 지우고 새로 저장 (순서 보장을 위해 _order 필드 추가)
    store.clear();
    songList.forEach((s, i) => store.put({ ...s, _order: i }));
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function dbDeleteOne(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

// ─────────────────────────────────────────
//  Persist
// ─────────────────────────────────────────
async function save() {
  try {
    await dbPutAll(songs);
  } catch (err) {
    console.error('저장 실패:', err);
  }
}

// ─────────────────────────────────────────
//  Init: DB 열고 데이터 로드 (localStorage 마이그레이션 포함)
// ─────────────────────────────────────────
async function initDB() {
  db = await openDB();

  // localStorage 마이그레이션
  const legacy = localStorage.getItem('hymnSongs');
  if (legacy) {
    try {
      const legacySongs = JSON.parse(legacy);
      if (Array.isArray(legacySongs) && legacySongs.length > 0) {
        await dbPutAll(legacySongs);
        localStorage.removeItem('hymnSongs');
        console.log(`localStorage에서 ${legacySongs.length}곡 마이그레이션 완료`);
      }
    } catch(e) { /* 무시 */ }
  }

  const stored = await dbGetAll();
  // _order 기준 정렬
  songs = stored.sort((a, b) => (a._order ?? 0) - (b._order ?? 0));
  renderList();
}

// ─────────────────────────────────────────
//  Render List
// ─────────────────────────────────────────
function filteredSongs() {
  return songs.filter(s => {
    const matchType = filterMode === 'all' || s.type === filterMode;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || s.title.toLowerCase().includes(q) || (s.number && s.number.toLowerCase().includes(q));
    return matchType && matchSearch;
  });
}

function renderList() {
  const list = document.getElementById('songList');
  const items = filteredSongs();
  document.getElementById('totalCount').textContent = songs.length + '곡';
  document.getElementById('listHeader').textContent = `목록 (${items.length}곡)`;

  if (items.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📂</div>${searchQuery || filterMode !== 'all' ? '검색 결과가 없습니다.' : '악보를 추가해 보세요.<br>위의 <b>+ 악보 추가</b> 버튼을 눌러<br>첫 번째 곡을 등록하세요.'}</div>`;
    return;
  }

  list.innerHTML = '';
  items.forEach(song => {
    const div = document.createElement('div');
    div.className = 'song-item' + (song.id === activeId ? ' active' : '');
    div.dataset.id = song.id;
    // draggable은 drag-handle에서만 제어 (iOS 터치 클릭 호환)
    const isTouchDevice = () => navigator.maxTouchPoints > 0;
    if (!isTouchDevice()) div.draggable = true;

    const tagClass = song.type === 'hymn' ? 'tag-hymn' : 'tag-gospel';
    const tagLabel = song.type === 'hymn' ? '찬송가' : '복음성가';
    const pages = song.images ? song.images.length : 0;

    div.innerHTML = `
      <span class="drag-handle" title="드래그로 순서 변경">⠿</span>
      <span class="song-num">${song.number || ''}</span>
      <div class="song-info">
        <div class="song-title">${song.title}</div>
        ${pages > 0 ? `<div class="song-sub">${pages}페이지</div>` : '<div class="song-sub" style="color:#6a5030">이미지 없음</div>'}
      </div>
      <span class="song-tag ${tagClass}">${tagLabel}</span>
      <button class="delete-btn" title="삭제" data-id="${song.id}">✕</button>
    `;

    // Click to open (터치 기기 포함)
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-btn')) return;
      openSong(song.id);
    });
    div.addEventListener('touchend', (e) => {
      if (e.target.classList.contains('delete-btn')) return;
      if (e.cancelable) e.preventDefault();
      openSong(song.id);
    }, { passive: false });

    // Delete
    div.querySelector('.delete-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      if (confirm(`"${song.title}" 을(를) 삭제할까요?`)) {
        songs = songs.filter(s => s.id !== song.id);
        if (activeId === song.id) { activeId = null; showNoSelection(); }
        save(); renderList();
      }
    });

    // Drag & Drop
    const handle = div.querySelector('.drag-handle');
    handle.addEventListener('mousedown', () => { div.draggable = true; });
    handle.addEventListener('mouseleave', () => { if (!dragSrcId) div.draggable = false; });

    div.addEventListener('dragstart', (e) => {
      dragSrcId = song.id;
      div.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', song.id);
    });
    div.addEventListener('dragend', () => {
      div.draggable = false;
      dragSrcId = null;
      div.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    });
    div.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      div.classList.add('drag-over');
    });
    div.addEventListener('dragleave', (e) => {
      if (!div.contains(e.relatedTarget)) div.classList.remove('drag-over');
    });
    div.addEventListener('drop', (e) => {
      e.preventDefault();
      div.classList.remove('drag-over');
      const srcId = dragSrcId || e.dataTransfer.getData('text/plain');
      if (srcId && srcId !== song.id) {
        const srcIdx = songs.findIndex(s => s.id === srcId);
        const tgtIdx = songs.findIndex(s => s.id === song.id);
        if (srcIdx !== -1 && tgtIdx !== -1) {
          const [moved] = songs.splice(srcIdx, 1);
          songs.splice(tgtIdx, 0, moved);
          save();
          renderList();
        }
      }
    });

    list.appendChild(div);
  });
}

// ─────────────────────────────────────────
//  Open Song
// ─────────────────────────────────────────
function openSong(id) {
  const song = songs.find(s => s.id === id);
  if (!song) return;
  activeId = id;
  currentPageIdx = 0;
  zoomScale = 1;
  renderList();
  showViewer(song);
}

function showNoSelection() {
  document.getElementById('noSelection').style.display = 'flex';
  document.getElementById('viewerContent').style.display = 'none';
}

function showViewer(song) {
  document.getElementById('noSelection').style.display = 'none';
  const vc = document.getElementById('viewerContent');
  vc.style.display = 'flex';

  document.getElementById('vTitle').textContent = (song.number ? song.number + ' ' : '') + song.title;
  document.getElementById('vSubtitle').textContent = song.type === 'hymn' ? '찬송가' : '복음성가';

  renderPage(song);
  renderThumbs(song);
  updateContNav();
}

function renderPage(song) {
  const imgs = song.images || [];
  const img = document.getElementById('sheetImg');
  const pi = document.getElementById('pageIndicator');

  if (imgs.length === 0) {
    img.src = '';
    img.style.display = 'none';
    pi.textContent = '이미지 없음';
  } else {
    img.style.display = 'block';
    img.src = imgs[currentPageIdx];
    // zoom: scale via max-width so image stays within view at 100%, expands when zoomed
    if (zoomScale === 1) {
      img.style.maxWidth = 'calc(100% - 40px)';
      img.style.maxHeight = 'calc(100vh - 260px)';
      img.style.width = '';
      img.style.transform = '';
    } else {
      img.style.maxWidth = 'none';
      img.style.maxHeight = 'none';
      img.style.width = `${Math.round(zoomScale * 100)}%`;
      img.style.transform = '';
    }
    pi.textContent = `${currentPageIdx + 1} / ${imgs.length}`;
  }

  // 페이지 이전/다음 버튼: 곡 경계 넘기 고려 (곡 목록 첫/마지막 곡의 끝에서만 비활성)
  const fList = filteredSongs();
  const sIdx = getSongListIndex(activeId);
  const atFirstPage = currentPageIdx <= 0;
  const atLastPage = currentPageIdx >= imgs.length - 1 || imgs.length === 0;
  const isFirstSong = sIdx <= 0;
  const isLastSong = sIdx >= fList.length - 1;
  document.getElementById('prevBtn').disabled = atFirstPage && isFirstSong;
  document.getElementById('nextBtn').disabled = atLastPage && isLastSong;
  document.getElementById('zoomLevel').textContent = Math.round(zoomScale * 100) + '%';

  // update thumb active
  document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === currentPageIdx));
}

function renderThumbs(song) {
  const strip = document.getElementById('thumbStrip');
  strip.innerHTML = '';
  const imgs = song.images || [];
  imgs.forEach((src, i) => {
    const img = document.createElement('img');
    img.className = 'thumb' + (i === currentPageIdx ? ' active' : '');
    img.src = src;
    img.title = `페이지 ${i+1}`;
    img.addEventListener('click', () => { currentPageIdx = i; renderPage(song); });
    strip.appendChild(img);
  });
  // Add image button
  const addThumb = document.createElement('div');
  addThumb.className = 'thumb-placeholder';
  addThumb.title = '이미지 추가';
  addThumb.textContent = '＋';
  addThumb.addEventListener('click', () => openAddImageForSong(song));
  strip.appendChild(addThumb);
}

function openAddImageForSong(song) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*'; inp.multiple = true;
  inp.onchange = async () => {
    for (const file of inp.files) {
      const dataUrl = await readFile(file);
      song.images = song.images || [];
      song.images.push(dataUrl);
    }
    save(); renderThumbs(song); renderPage(song);
  };
  inp.click();
}



// ─────────────────────────────────────────
//  Navigation — 페이지 & 곡 간 연속 이동
// ─────────────────────────────────────────

// 현재 필터된 목록 기준으로 곡 순서 인덱스 반환
function getSongListIndex(id) {
  return filteredSongs().findIndex(s => s.id === id);
}

// 곡 이동 (dir: -1 이전, +1 다음)
function navigateSong(dir) {
  const list = filteredSongs();
  const idx = getSongListIndex(activeId);
  const nextIdx = idx + dir;
  if (nextIdx < 0 || nextIdx >= list.length) return;
  openSong(list[nextIdx].id);
  // 다음 곡으로 가면 첫 페이지, 이전 곡으로 가면 마지막 페이지
  if (dir === 1) {
    currentPageIdx = 0;
  } else {
    const nextSong = list[nextIdx];
    currentPageIdx = Math.max(0, (nextSong.images || []).length - 1);
  }
  const targetSong = songs.find(s => s.id === list[nextIdx].id);
  if (targetSong) { renderPage(targetSong); renderThumbs(targetSong); }
}

// 페이지 이동 — 끝/시작에서 곡 경계 넘기
function navigate(dir) {
  const song = songs.find(s => s.id === activeId);
  if (!song) return;
  const imgs = song.images || [];

  const nextPage = currentPageIdx + dir;

  if (nextPage < 0) {
    // ← 첫 페이지에서 → 이전 곡 마지막 페이지로
    navigateSong(-1);
    return;
  }
  if (nextPage >= imgs.length) {
    // → 마지막 페이지에서 → 다음 곡 첫 페이지로
    navigateSong(1);
    return;
  }

  currentPageIdx = nextPage;
  renderPage(song);
}

// 곡 간 이동 바 업데이트
function updateContNav() {
  const list = filteredSongs();
  const idx = getSongListIndex(activeId);
  const total = list.length;

  const prevSong = idx > 0 ? list[idx - 1] : null;
  const nextSong = idx < total - 1 ? list[idx + 1] : null;

  const contPrevBtn = document.getElementById('contPrevBtn');
  const contNextBtn = document.getElementById('contNextBtn');
  const contPrevLabel = document.getElementById('contPrevLabel');
  const contNextLabel = document.getElementById('contNextLabel');
  const contSongInfo = document.getElementById('contSongInfo');

  contPrevBtn.disabled = !prevSong;
  contNextBtn.disabled = !nextSong;
  contPrevLabel.textContent = prevSong ? (prevSong.number ? prevSong.number + ' ' : '') + prevSong.title : '이전 곡 없음';
  contNextLabel.textContent = nextSong ? (nextSong.number ? nextSong.number + ' ' : '') + nextSong.title : '다음 곡 없음';
  contSongInfo.innerHTML = `<strong>${idx + 1}</strong> / ${total}곡`;
}

document.getElementById('prevBtn').addEventListener('click', () => navigate(-1));
document.getElementById('nextBtn').addEventListener('click', () => navigate(1));
document.getElementById('contPrevBtn').addEventListener('click', () => navigateSong(-1));
document.getElementById('contNextBtn').addEventListener('click', () => navigateSong(1));

// ─────────────────────────────────────────
//  Touch Swipe Gesture (아이패드 / 터치 기기)
// ─────────────────────────────────────────
(function initSwipe() {
  const area = document.getElementById('imageArea');
  let touchStartX = 0;
  let touchStartY = 0;
  let touchStartTime = 0;
  let isSwiping = false;

  // 스와이프 힌트 오버레이 생성
  const hint = document.createElement('div');
  hint.id = 'swipeHint';
  hint.style.cssText = `
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.55);
    color: #fff;
    border-radius: 16px;
    padding: 14px 28px;
    font-size: 22px;
    font-family: 'Noto Sans KR', sans-serif;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 50;
    white-space: nowrap;
    letter-spacing: 1px;
  `;
  area.appendChild(hint);

  function showHint(text) {
    hint.textContent = text;
    hint.style.opacity = '1';
    clearTimeout(hint._timer);
    hint._timer = setTimeout(() => { hint.style.opacity = '0'; }, 500);
  }

  area.addEventListener('touchstart', (e) => {
    // 멀티터치(핀치줌 등)는 무시
    if (e.touches.length !== 1) { isSwiping = false; return; }
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
    isSwiping = true;
  }, { passive: true });

  area.addEventListener('touchmove', (e) => {
    if (!isSwiping || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    // 수평 스와이프가 주도적일 때만 스크롤 방지
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
      e.preventDefault();
    }
  }, { passive: false });

  area.addEventListener('touchend', (e) => {
    if (!isSwiping) return;
    isSwiping = false;

    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const dt = Date.now() - touchStartTime;

    // 조건: 수평 이동이 수직보다 크고, 최소 40px 이상, 400ms 이내
    const isHorizontal = Math.abs(dx) > Math.abs(dy);
    const isSwipe = Math.abs(dx) > 40 && dt < 400;

    if (!isHorizontal || !isSwipe) return;

    if (dx < 0) {
      // 왼쪽으로 스와이프 → 다음 페이지
      showHint('▶');
      navigate(1);
    } else {
      // 오른쪽으로 스와이프 → 이전 페이지
      showHint('◀');
      navigate(-1);
    }
  }, { passive: true });
})();

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft' && e.shiftKey) { navigateSong(-1); return; }
  if (e.key === 'ArrowRight' && e.shiftKey) { navigateSong(1); return; }
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === '+' || e.key === '=') zoom(0.1);
  if (e.key === '-') zoom(-0.1);
  if (e.key === '0') resetZoom();
});

// ─────────────────────────────────────────
//  Zoom
// ─────────────────────────────────────────
function zoom(delta) {
  zoomScale = Math.max(0.3, Math.min(3, zoomScale + delta));
  const song = songs.find(s => s.id === activeId);
  if (song) renderPage(song);
}
function resetZoom() { zoomScale = 1; const song = songs.find(s => s.id === activeId); if (song) renderPage(song); }

document.getElementById('zoomIn').addEventListener('click', () => zoom(0.15));
document.getElementById('zoomOut').addEventListener('click', () => zoom(-0.15));
document.getElementById('zoomReset').addEventListener('click', resetZoom);

document.getElementById('saveBtn').addEventListener('click', () => {

  if (!title) { document.getElementById('inpTitle').focus(); return; }
  const type = document.querySelector('input[name="songType"]:checked').value;
  const number = document.getElementById('inpNumber').value.trim();
  const newSong = {
    id: Date.now().toString(),
    title, type, number,
    images: pendingFiles.map(f => f.dataUrl)
  };
  songs.push(newSong);
  save(); renderList(); closeModal();
  openSong(newSong.id);
});

// ─────────────────────────────────────────
//  File Drop
// ─────────────────────────────────────────
function readFile(file) {
  return new Promise((res) => {
    const r = new FileReader();
    r.onload = (e) => res(e.target.result);
    r.readAsDataURL(file);
  });
}

async function handleFiles(files) {
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const dataUrl = await readFile(file);
    pendingFiles.push({ name: file.name, dataUrl });
  }
  renderFilePreview();
}

function renderFilePreview() {
  const fp = document.getElementById('filePreview');
  fp.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    chip.innerHTML = `🖼 ${f.name} <button onclick="removeFile(${i})">✕</button>`;
    fp.appendChild(chip);
  });
}

window.removeFile = (i) => { pendingFiles.splice(i, 1); renderFilePreview(); };

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => handleFiles(fileInput.files));

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-active'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-active'));
dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('drag-active'); handleFiles(e.dataTransfer.files); });

/**
 * 파일 이름에서 찬송가 번호를 추출한다.
 * 지원 패턴:
 *   093.jpg / 93.jpg / 찬송가093.jpg / 찬송가_093.jpg
 *   새찬송가093.jpg / hymn093.jpg / 093-1.jpg (93장 1페이지) 등
 * 반환: { num: Number, page: Number } 또는 null
 */
function parseHymnFilename(filename) {
  // 확장자 제거
  const base = filename.replace(/\.[^.]+$/, '');
  // 연속 숫자 추출 (앞에서 첫 번째 숫자 덩어리)
  const m = base.match(/(\d+)/);
  if (!m) return null;
  const num = parseInt(m[1], 10);
  if (num < 1 || num > 800) return null;
  // 페이지 번호: 숫자 뒤에 [-_]숫자 가 있으면
  const pm = base.match(/\d+[-_](\d+)/);
  const page = pm ? parseInt(pm[1], 10) : 1;
  return { num, page };
}

function updateFolderUI() {
  const display = document.getElementById('folderPathDisplay');
  const clearBtn = document.getElementById('folderClearBtn');
  if (folderName) {
    display.textContent = folderName;
    display.classList.remove('empty');
    clearBtn.style.display = '';
  } else {
    display.textContent = '폴더 미설정';
    display.classList.add('empty');
    clearBtn.style.display = 'none';
  }
}

function clearFolder() {
  folderImageMap = {};
  folderName = '';
  folderFileCount = 0;
  folderMappedCount = 0;
  document.getElementById('folderInput').value = '';
  updateFolderUI();
  renderCatalog();
}

document.getElementById('folderSelectBtn').addEventListener('click', () => {
  document.getElementById('folderInput').click();
});

document.getElementById('folderClearBtn').addEventListener('click', clearFolder);

document.getElementById('folderInput').addEventListener('change', (e) => {
  const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
  if (files.length === 0) { alert('선택한 폴더에 이미지 파일이 없습니다.'); return; }

  folderFileCount = files.length;
  folderImageMap = {};

  // 폴더명 추출
  const firstPath = files[0].webkitRelativePath || files[0].name;
  folderName = firstPath.includes('/') ? firstPath.split('/')[0] : '선택한 폴더';
  updateFolderUI();

  // 파일 이름으로 번호 그룹화
  // { num: [{page, file}, ...] }
  const groups = {};
  files.forEach(f => {
    const parsed = parseHymnFilename(f.name);
    if (!parsed) return;
    const { num, page } = parsed;
    if (!groups[num]) groups[num] = [];
    groups[num].push({ page, file: f });
  });

  // 각 그룹을 페이지 순 정렬 후 Base64 변환
  const numList = Object.keys(groups).map(Number);
  folderMappedCount = numList.length;

  let processed = 0;
  const total = files.filter(f => {
    const p = parseHymnFilename(f.name); return p !== null;
  }).length;

  if (total === 0) {
    alert('파일 이름에서 찬송가 번호를 인식할 수 없습니다.\n파일 이름이 "093.jpg", "찬송가093.jpg" 등의 형식이어야 합니다.');
    clearFolder();
    return;
  }

  // 로딩 표시
  document.getElementById('folderPathDisplay').textContent = `읽는 중… (0/${total})`;

  numList.forEach(num => {
    const sorted = groups[num].sort((a, b) => a.page - b.page);
    folderImageMap[num] = new Array(sorted.length).fill(null);
    sorted.forEach((item, idx) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        folderImageMap[num][idx] = ev.target.result;
        processed++;
        document.getElementById('folderPathDisplay').textContent = `읽는 중… (${processed}/${total})`;
        if (processed >= total) {
          // 완료
          updateFolderUI();
          updateFolderScanInfo();
          renderCatalog();
        }
      };
      reader.readAsDataURL(item.file);
    });
  });
});

function updateFolderScanInfo() {
  const el = document.getElementById('folderScanInfo');
  const txt = document.getElementById('folderScanText');
  if (!folderName) {
    el.classList.remove('visible');
    return;
  }
  el.classList.add('visible');
  const mapped = Object.keys(folderImageMap).length;
  txt.textContent = `"${folderName}" — ${folderFileCount}개 파일에서 ${mapped}곡 번호 인식됨`;
}

// 특정 찬송가 번호에 매핑된 이미지 dataUrl 배열 반환 (없으면 [])
function getFolderImages(num) {
  if (!folderImageMap[num]) return [];
  return folderImageMap[num].filter(Boolean);
}

document.getElementById('exportBtn').addEventListener('click', () => {
  if (songs.length === 0) { alert('저장할 곡이 없습니다.'); return; }

  // 이미지 데이터(Base64)는 이미 songs 안에 포함돼 있음
  const exportData = {
    version: 1,
    exportedAt: new Date().toISOString(),
    songs: songs.map(s => ({
      id: s.id,
      type: s.type,
      number: s.number,
      title: s.title,
      images: s.images || []   // Base64 그대로 복사
    }))
  };

  const json = JSON.stringify(exportData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','');
  a.href = url;
  a.download = `악보목록_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFileInput').click();
});

document.getElementById('importFileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.songs || !Array.isArray(data.songs)) throw new Error('올바른 형식이 아닙니다.');

      const existingCount = songs.length;
      const incoming = data.songs;

      if (existingCount === 0) {
        // 목록이 비어있으면 그냥 교체
        songs = incoming;
        await save();
        renderList();
        alert(`✅ ${incoming.length}곡을 불러왔습니다.`);
      } else {
        // 기존 목록이 있으면 선택지 제공
        const choice = confirm(
          `현재 목록 ${existingCount}곡이 있습니다.

` +
          `[확인] 기존 목록에 추가 (${incoming.length}곡)
` +
          `[취소] 기존 목록을 지우고 교체`
        );
        if (choice) {
          // 추가 (id 중복 제거)
          const existingIds = new Set(songs.map(s => s.id));
          const toAdd = incoming.filter(s => !existingIds.has(s.id));
          songs = [...songs, ...toAdd];
          await save();
          renderList();
          alert(`✅ ${toAdd.length}곡 추가됨 (중복 ${incoming.length - toAdd.length}곡 제외)`);
        } else {
          songs = incoming;
          activeId = null;
          showNoSelection();
          await save();
          renderList();
          alert(`✅ ${incoming.length}곡으로 교체됐습니다.`);
        }
      }
    } catch (err) {
      alert('❌ 파일을 읽을 수 없습니다: ' + err.message);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

document.getElementById('catalogBtn').addEventListener('click', openCatalog);
document.getElementById('catalogClose').addEventListener('click', closeCatalog);
document.getElementById('catalogOverlay').addEventListener('click', e => { if (e.target === document.getElementById('catalogOverlay')) closeCatalog(); });

document.querySelectorAll('.ctype-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ctype-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    catalogType = btn.dataset.ctype;
    document.getElementById('catalogTitle').textContent = catalogType === 'hymn' ? '📖 찬송가 목차에서 악보 추가' : '🎵 복음성가 목차에서 악보 추가';
    renderCatalog();
  });
});

document.getElementById('catalogSearch').addEventListener('input', e => {
  catalogQuery = e.target.value.trim();
  renderCatalog();
});

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

function renderCatalog() {
  const list = document.getElementById('catalogList');
  const info = document.getElementById('catalogResultInfo');
  const db = catalogType === 'hymn' ? HYMN_DB : GOSPEL_DB;
  const q = catalogQuery.toLowerCase();



  let filtered = db;
  if (q) {
    filtered = db.filter(h => {
      const numMatch = String(h.n).includes(q);
      const titleMatch = h.t.toLowerCase().includes(q);
      return numMatch || titleMatch;
    });
  }

  const typeLabel = catalogType === 'hymn' ? '새찬송가' : '복음성가·CCM';
  info.textContent = q ? `검색 결과 ${filtered.length}곡 / 전체 ${db.length}곡` : `${typeLabel} 전체 ${db.length}곡`;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="catalog-empty">검색 결과가 없습니다.</div>';
    return;
  }

  const addedNumbers = new Set(
    songs.filter(s => s.type === catalogType).map(s => s.number)
  );

  list.innerHTML = '';
  filtered.slice(0, 200).forEach(h => {
    const numStr = String(h.n) + '장';
    const alreadyAdded = addedNumbers.has(numStr);
    const folderImgs = catalogType === 'hymn' ? getFolderImages(h.n) : [];
    const hasImg = folderImgs.length > 0;
    const div = document.createElement('div');
    div.className = 'catalog-item' + (alreadyAdded ? ' already-added' : '');
    div.innerHTML = `
      <span class="ci-num">${h.n}${catalogType==='hymn'?'장':''}</span>
      <span class="ci-title">${highlight(h.t, catalogQuery)}</span>
      ${h.a ? `<span class="ci-artist">${h.a}</span>` : ''}
      ${folderName && catalogType === 'hymn'
        ? (hasImg
            ? `<span class="ci-img-badge">🖼 ${folderImgs.length}p</span>`
            : `<span class="ci-img-badge missing">이미지 없음</span>`)
        : ''}
      ${!alreadyAdded ? `<button class="ci-add" data-n="${h.n}" data-t="${h.t.replace(/"/g,'&quot;')}">+ 목록 추가</button>` : ''}
    `;
    if (!alreadyAdded) {
      div.querySelector('.ci-add').addEventListener('click', (e) => {
        e.stopPropagation();
        addHymnFromCatalog(h.n, h.t, catalogType);
        renderCatalog();
      });
    }
    list.appendChild(div);
  });

  if (filtered.length > 200) {
    const more = document.createElement('div');
    more.className = 'catalog-empty';
    more.style.paddingTop = '10px';
    more.textContent = `... 외 ${filtered.length - 200}곡 더 있습니다. 검색어를 입력하여 좁혀보세요.`;
    list.appendChild(more);
  }
}

function addHymnFromCatalog(num, title, type) {
  const numStr = type === 'hymn' ? String(num) + '장' : String(num) + '번';
  // 중복 확인
  const exists = songs.some(s => s.type === type && s.number === numStr);
  if (exists) return;

  // 폴더에서 이미지 자동 연결 (찬송가만)
  const autoImages = (type === 'hymn') ? getFolderImages(num) : [];

  const newSong = {
    id: Date.now().toString() + Math.random().toString(36).slice(2),
    title, type,
    number: numStr,
    images: autoImages
  };
  songs.push(newSong);
  save();
  renderList();

  if (autoImages.length > 0) {
    // 잠깐 피드백 표시
    const infoEl = document.getElementById('catalogResultInfo');
    const prev = infoEl.textContent;
    infoEl.textContent = `✅ "${title}" 추가됨 — 이미지 ${autoImages.length}페이지 자동 연결`;
    infoEl.style.color = '#3a8a3a';
    setTimeout(() => { infoEl.textContent = prev; infoEl.style.color = ''; }, 2000);
  }
}

// ─────────────────────────────────────────
//  Sidebar Toggle (접기/펼치기)
// ─────────────────────────────────────────
(function initSidebarToggle() {
  const btn = document.getElementById('sidebarToggle');
  const sidebar = document.querySelector('.sidebar');
  let isCollapsed = false;

  // 매 프레임마다 사이드바 오른쪽 끝에 버튼을 붙임
  // CSS transition 타이밍 불일치 문제를 완전히 우회
  function trackLoop() {
    btn.style.left = sidebar.offsetWidth + 'px';
    requestAnimationFrame(trackLoop);
  }
  requestAnimationFrame(trackLoop);

  btn.addEventListener('click', () => {
    isCollapsed = !isCollapsed;
    sidebar.classList.toggle('collapsed', isCollapsed);
    btn.classList.toggle('open', !isCollapsed);
    btn.classList.toggle('closed', isCollapsed);
    btn.title = isCollapsed ? '목록 펼치기' : '목록 접기';
  });
})();

// ─────────────────────────────────────────
//  Init
// ─────────────────────────────────────────
initDB();
</script>
